<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f5f7fa;}

.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  border-bottom:3px solid #1f5aa6;
}

.header img{height:40px;}
.header-title{font-weight:bold;color:#1f5aa6;}

.info-bar{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  padding:10px 15px;
  background:#e9eef5;
  border-bottom:2px solid #1f5aa6;
  font-size:14px;
}

.container{padding:15px;}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input{
  padding:12px;
  width:100%;
  margin:5px 0;
}

button{
  padding:15px;
  border:none;
  border-radius:8px;
  font-size:16px;
  color:white;
  font-weight:bold;
}

.start-btn{background:#1f5aa6;width:100%;}

.btn-row{
  display:flex;
  gap:5px;
  margin-bottom:10px;
}

.main-btn{background:#1f5aa6;flex:3;}
.scrap-btn{background:red;flex:1;}
.pause-btn{background:#f39c12;flex:1;}
.restart-btn{background:#2ecc71;flex:1;}
.end-btn{background:#34495e;width:100%;}

.big{font-size:24px;text-align:center;}

table{width:100%;border-collapse:collapse;}

th,td{
  border-bottom:1px solid #ccc;
  padding:6px;
  text-align:center;
}

th{
  background:#1f5aa6;
  color:white;
}

.delete-btn{
  cursor:pointer;
  color:red;
  font-size:18px;
}
</style>
</head>

<body>

<div class="header">
  <!--<img src="https://www.cfnews.net/var/cfnews/storage/images/_aliases/medium/mediatheque/hd/standard-hd/logos/novares-art-logo-2019/1372329-3-fre-FR/Novares-ART-Logo-2019.png">-->
  <div class="header-title">Run@Rate Tool</div>
</div>

<div id="infoBar" class="info-bar" style="display:none">
  <div><b>Customer:</b> <span id="infoClient"></span></div>
  <div><b>Vehicle:</b> <span id="infoVehicle"></span></div>
  <div><b>Part:</b> <span id="infoPart"></span></div>
  <div><b>Cycle time target:</b> <span id="infoTarget"></span> s</div>
</div>

<div class="container">

<div id="setup" class="card">
  <input id="client" placeholder="Customer">
  <input id="vehicle" placeholder="Vehicle">
  <input id="part" placeholder="Part">
  <input id="target" type="number" placeholder="Cycle time target (sec)">
  <button class="start-btn" onclick="start()">START PRODUCTION</button>
</div>

<div id="prod" style="display:none">

<div class="card big" id="cycle">--</div>

<div class="btn-row control">
  <button class="main-btn" onclick="record()">PART PRODUCED</button>
  <button class="scrap-btn" onclick="scrap()">SCRAP</button>
</div>

<div class="btn-row control">
  <button class="pause-btn" onclick="pause()">PAUSE</button>
  <button class="restart-btn" onclick="restart()">RESTART</button>
</div>

<button class="end-btn control" onclick="endProduction()">END OF PRODUCTION</button>

<div class="card" id="performanceCard">
  <h3>Performance</h3>
  <div id="perf"></div>
</div>

<div class="card">
  <h3>GRAPH</h3>
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <h3>TABLE</h3>
  <table id="table"></table>
</div>

</div>
</div>

<script>

let lastTime=null;
let startTime=null;
let cycles=[];
let events=[];
let chart;
let targetVal=0;
let isPaused=false;
let pauseStart=null;
let timerInterval=null;

function start(){
  const client = document.getElementById("client").value;
  const vehicle = document.getElementById("vehicle").value;
  const part = document.getElementById("part").value;
  targetVal = Number(document.getElementById("target").value);

  document.getElementById("infoClient").innerText = client;
  document.getElementById("infoVehicle").innerText = vehicle;
  document.getElementById("infoPart").innerText = part;
  document.getElementById("infoTarget").innerText = targetVal;

  document.getElementById("infoBar").style.display="flex";

  startTime=Date.now();
  lastTime=null;
  cycles=[];
  events=[];
  isPaused=false;

  document.getElementById("setup").style.display="none";
  document.getElementById("prod").style.display="block";

  initChart();
  rebuildTable();
  startTimers();
}

function startTimers(){
  timerInterval = setInterval(()=>{
    const now=Date.now();
    let live=lastTime?(now-lastTime)/1000:0;
    let total=(now-startTime)/1000;

    let lastCycle=cycles[cycles.length-1]||0;

    let el=document.getElementById("cycle");
    el.innerText=`${lastCycle.toFixed(2)} s | t=${live.toFixed(2)} s | T=${total.toFixed(2)} s`;
    el.style.color=(live>targetVal)?"red":"green";
  },200);
}

function stopTimers(){
  clearInterval(timerInterval);
}

function record(){
  if(isPaused) return;
  const now=Date.now();

  if(lastTime===null){ lastTime=now; return; }

  const cycle=(now-lastTime)/1000;
  cycles.push(cycle);
  events.push({type:"cycle",value:cycle});
  lastTime=now;

  rebuildChart();
  rebuildTable();
  updatePerformance();
}

function scrap(){
  if(isPaused) return;
  const now=Date.now();

  if(lastTime===null){ lastTime=now; return; }

  const t=(now-lastTime)/1000;
  events.push({type:"scrap",value:t});
  lastTime=now;

  rebuildTable();
}

function pause(){
  if(isPaused || !lastTime) return;
  isPaused=true;
  pauseStart=Date.now();
}

function restart(){
  if(!isPaused) return;

  const now=Date.now();
  const pauseDuration=(now-pauseStart)/1000;

  events.push({type:"pause",value:pauseDuration});
  lastTime += (now-pauseStart);
  isPaused=false;

  rebuildTable();
}

function deleteRow(i){
  events.splice(i,1);
  rebuildTable();
}

function updatePerformance(){
  if(cycles.length===0) return;

  const avg=cycles.reduce((a,b)=>a+b,0)/cycles.length;
  const dur=(Date.now()-startTime)/1000;
  const pph=(cycles.length/dur)*3600;
  const perf=targetVal/avg*100;

  document.getElementById("perf").innerHTML =
    `Average: ${avg.toFixed(2)} s<br>
     Parts/hour: ${pph.toFixed(0)}<br>
     Performance: ${perf.toFixed(1)} %`;
}

function initChart(){
  chart=new Chart(document.getElementById("chart"),{
    type:'line',
    data:{labels:[],datasets:[
      {label:"Cycle",data:[],borderColor:"green"},
      {label:"Average",data:[],borderColor:"blue",borderDash:[5,5]},
      {label:"Cycle time target",data:[],borderColor:"red",borderDash:[5,5]}
    ]}
  });
}

function rebuildChart(){
  chart.data.labels=[];
  chart.data.datasets.forEach(d=>d.data=[]);

  let sum=0;

  cycles.forEach((c,i)=>{
    sum+=c;
    let avg=sum/(i+1);

    chart.data.labels.push(i+1);
    chart.data.datasets[0].data.push(c);
    chart.data.datasets[1].data.push(avg);
    chart.data.datasets[2].data.push(targetVal);
  });

  chart.update();
}

function rebuildTable(){
  const table=document.getElementById("table");

  table.innerHTML=`<tr><th>Part</th><th>Time</th><th>Status</th><th></th></tr>`;

  let idx=1;

  events.forEach((e,i)=>{
    const row=table.insertRow();

    if(e.type==="cycle"){
      row.innerHTML=`<td>${idx}</td><td>${e.value.toFixed(2)}</td><td>${e.value>targetVal?"❌":"✅"}</td><td><span class="delete-btn" onclick="deleteRow(${i})">🗑️</span></td>`;
      idx++;
    }
    if(e.type==="pause"){
      row.innerHTML=`<td>PAUSE</td><td>${e.value.toFixed(2)}</td><td>⏸</td><td></td>`;
    }
    if(e.type==="scrap"){
      row.innerHTML=`<td>SCRAP</td><td>${e.value.toFixed(2)}</td><td>❌</td><td></td>`;
    }
  });
}

function endProduction(){

  stopTimers();

  let totalTime=(Date.now()-startTime)/1000;
  let pauseTime = events.filter(e=>e.type==="pause").reduce((a,b)=>a+b.value,0);
  let pauseCount = events.filter(e=>e.type==="pause").length;
  let scrapCount = events.filter(e=>e.type==="scrap").length;
  let goodCount = cycles.length;
  let totalParts = goodCount + scrapCount;

  let scrapRate = totalParts ? (scrapCount/totalParts*100) : 0;
  let goodRate = totalParts ? (goodCount/totalParts*100) : 0;

  let avgCycle = cycles.length ? cycles.reduce((a,b)=>a+b,0)/cycles.length : 0;

  const client = document.getElementById("infoClient").innerText;
  const vehicle = document.getElementById("infoVehicle").innerText;
  const part = document.getElementById("infoPart").innerText;
  const target = document.getElementById("infoTarget").innerText;

  document.getElementById("performanceCard").innerHTML = `
    <h3>END OF PRODUCTION REPORT</h3>

    <b>Customer:</b> ${client}<br>
    <b>Vehicle:</b> ${vehicle}<br>
    <b>Part:</b> ${part}<br>
    <b>Cycle time target:</b> ${target} s<br><br>

    Total time: ${totalTime.toFixed(1)} s<br>
    Total parts: ${totalParts}<br><br>

    Average cycle: ${avgCycle.toFixed(2)} s<br><br>

    Good parts: ${goodCount} (${goodRate.toFixed(1)}%)<br>
    Scrap: ${scrapCount} (${scrapRate.toFixed(1)}%)<br><br>

    Total pause time: ${pauseTime.toFixed(1)} s<br>
    Number of pauses: ${pauseCount}
  `;

  document.getElementById("infoBar").style.display="none";
  document.getElementById("cycle").style.display="none";
  document.querySelectorAll(".control").forEach(el=>el.style.display="none");
  document.querySelectorAll(".delete-btn").forEach(el=>el.style.display="none");
}

</script>

</body>
</html>
